upstream backend_api {
    server backend:4000;
    keepalive 32;
}

# HTTP → HTTPS (удобно с ПК, где доверен mkcert)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name localhost _;

    location / {
        return 301 https://$host$request_uri;
    }
}

# Основной HTTPS (localhost / IP хоста / будущий домен)
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name localhost _;

    ssl_certificate     /etc/nginx/certs/mkcert-localhost.pem;
    ssl_certificate_key /etc/nginx/certs/mkcert-localhost-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    include /etc/nginx/snippets/crm-locations.conf;
}

# Тот же SPA + API по HTTP на отдельном порту — для доступа с телефона/другого ПК в LAN
# без доверенного сертификата (браузер не ругается). В продакшене закройте 8080 файрволом.
server {
    listen 8080 default_server;
    listen [::]:8080 default_server;
    server_name localhost _;

    include /etc/nginx/snippets/crm-locations.conf;
}
